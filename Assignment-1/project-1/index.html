<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pikachu UI</title>
    <link rel="shortcut icon" href="./Images/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Left -->
      <div class="left">
        <img src="./Images/logo.png" alt="pokemon logo" class="logo" />

        <h4>POKEMON GEN I</h4>

        <h1>Pikachu</h1>

        <p>
          Pikachu is an Electric-type Pokémon introduced <br />in Generation I.
          Pikachu are small, chubby,<br />
          and incredibly cute mouse-like Pokémon, <br />They are almost
          completely covered by <br />
          yellow fur.
        </p>

        <div class="count"><span class="hr-line"></span>01 / 08</div>

        <img src="./Images/pokeball.png" alt="Pokeball" class="pokeball" />
      </div>

      <!-- Right -->
      <div class="right">
        <div class="menu">☰</div>

        <div class="dots">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>

        <img src="./Images/pikachu.png" alt="pikachu" class="pikachu" />
      </div>
    </div>
  </body>
</html>
